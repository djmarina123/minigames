name: minigames_hub
description: MiniPlay — hub de jogos casuais para mobile.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  firebase_messaging: ^15.2.10
  firebase_remote_config: ^5.5.0
  flame: ^1.30.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.2.3
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
